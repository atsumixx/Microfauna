<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <title>Edit Sale - Microfauna Sales Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .qty-stepper {
            display: flex;
            align-items: center;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            width: 130px;
            background: var(--bg-input, var(--bg-secondary));
        }
        .qty-stepper button {
            all: unset;
            width: 40px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-primary);
            flex-shrink: 0;
        }
        .qty-stepper button:active { background: var(--border-color); }
        .qty-stepper input[type=number] {
            all: unset;
            width: 50px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            border-left: 1.5px solid var(--border-color);
            border-right: 1.5px solid var(--border-color);
            height: 44px;
            -moz-appearance: textfield;
            appearance: none;
        }
        .qty-stepper input[type=number]::-webkit-inner-spin-button,
        .qty-stepper input[type=number]::-webkit-outer-spin-button { display: none; }

        .item-edit-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 10px;
            background: var(--bg-secondary);
            flex-wrap: wrap;
        }
        .item-edit-row select { flex: 1; min-width: 200px; margin: 0; }
        .item-edit-row .remove-btn {
            all: unset;
            cursor: pointer;
            color: var(--accent-danger, #ff4444);
            font-size: 1.4rem;
            line-height: 1;
            padding: 4px 8px;
        }
        .discount-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }
        .discount-row label { font-weight: 600; white-space: nowrap; }
        .discount-row input { max-width: 160px; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" fill="currentColor"/>
            <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/>
        </svg>
    </button>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>

    <div class="container">
        <h1>✏️ Edit Sale #{{ sale.id }}</h1>

        {% if error %}
        <div class="alert alert-error"><strong>Error:</strong> {{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('edit_sale', sale_id=sale.id) }}" id="editSaleForm">
            <label for="customer_name">Customer Name *</label>
            <input type="text" id="customer_name" name="customer_name"
                   value="{{ sale.customer_name }}" required>

            <label for="date">Sale Date *</label>
            <!-- Pre-fill existing date, formatted as YYYY-MM-DD for the date input -->
            <input type="date" id="date" name="date"
                   value="{{ sale.date | string | truncate(10, True, '') }}" required>

            <label for="notes">Notes (Optional)</label>
            <textarea id="notes" name="notes"
                      placeholder="Add any additional notes...">{{ sale.notes or '' }}</textarea>

            <h3>Items in Sale</h3>
            <div id="items-container">
                {% for item in sale_items %}
                <div class="item-edit-row">
                    <select name="item_id" required>
                        <option value="">Select Item</option>
                        {% for available_item in items %}
                        <option value="{{ available_item.id }}"
                                data-price="{{ available_item.price }}"
                                {% if available_item.name == item.item_name %}selected{% endif %}>
                            {{ available_item.name }} — ₱{{ "%.2f"|format(available_item.price) }}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="qty-stepper">
                        <button type="button" onclick="changeQty(this,-1)">−</button>
                        <input type="number" name="quantity" min="1" value="{{ item.quantity }}" required>
                        <button type="button" onclick="changeQty(this, 1)">+</button>
                    </div>
                    <button type="button" class="remove-btn" onclick="removeItem(this)" title="Remove">✕</button>
                </div>
                {% endfor %}
            </div>

            <button type="button" class="btn btn-secondary" onclick="addItem()"
                    style="margin-bottom:16px;">+ Add Another Item</button>

            <!-- Discount -->
            <div class="discount-row">
                <label for="discount">Discount (₱)</label>
                <input type="number" id="discount" name="discount"
                       min="0" step="0.01"
                       value="{{ sale.discount if sale.discount else 0 }}"
                       placeholder="0.00">
            </div>

            <div style="margin-top: 24px;">
                <button type="submit" class="btn">Save Changes</button>
                <a href="{{ url_for('view_sales') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

    <script>
        const availableItems = JSON.parse('{{ items_json | tojson | safe }}');

        function changeQty(btn, delta) {
            const input = btn.parentElement.querySelector('input[type=number]');
            let val = parseInt(input.value) || 1;
            val = Math.max(1, val + delta);
            input.value = val;
        }

        function addItem() {
            const container = document.getElementById('items-container');
            const row       = document.createElement('div');
            row.className   = 'item-edit-row';

            let options = '<option value="">Select Item</option>';
            availableItems.forEach(item => {
                options += `<option value="${item.id}" data-price="${item.price}">
                    ${item.name} — ₱${item.price.toFixed(2)}</option>`;
            });

            row.innerHTML = `
                <select name="item_id" required>${options}</select>
                <div class="qty-stepper">
                    <button type="button" onclick="changeQty(this,-1)">−</button>
                    <input type="number" name="quantity" min="1" value="1" required>
                    <button type="button" onclick="changeQty(this, 1)">+</button>
                </div>
                <button type="button" class="remove-btn" onclick="removeItem(this)" title="Remove">✕</button>`;
            container.appendChild(row);
        }

        function removeItem(btn) {
            btn.closest('.item-edit-row').remove();
        }

        document.getElementById('editSaleForm').addEventListener('submit', function(e) {
            if (!document.querySelectorAll('#items-container .item-edit-row').length) {
                e.preventDefault();
                alert('Please add at least one item to the sale.');
            }
        });
    </script>
</body>
</html>
